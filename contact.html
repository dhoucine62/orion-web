<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AURA | Contact</title>
    
	<script src="https://cdn.tailwindcss.com"></script>
    
	<script src="scripts/script.js"></script>
	<link rel="stylesheet" src="styles/style.css">
</head>
<body class="text-gray-300 min-h-screen flex flex-col selection:bg-aura-green selection:text-black bg-[#050505] relative overflow-x-hidden font-sans">

	<header class="sticky top-0 w-full z-50 bg-[#050505]/60 backdrop-blur-md border-b border-white/10 p-4 transition-all">
		<div class="max-w-7xl mx-auto flex justify-between items-center px-4">
			<div class="flex items-center gap-2">
				<svg class="w-8 h-8 text-aura-green drop-shadow-[0_0_8px_rgba(0,255,102,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
				</svg>
				<span class="text-2xl font-bold text-white tracking-widest">AURA</span>
			</div>
            
			<nav class="hidden md:flex gap-8 items-center">
				<a href="/" class="text-sm font-medium text-gray-400 hover:text-aura-green transition-colors">Accueil</a>
				<a href="/about" class="text-sm font-medium text-gray-400 hover:text-aura-green transition-colors">À propos</a>
				<a href="/contact" class="text-sm font-medium text-white hover:text-aura-green transition-colors">Nous contacter</a>
			</nav>

			<button class="md:hidden text-gray-400 hover:text-white">
				<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
			</button>
		</div>
	</header>

	<main class="flex-grow flex flex-col items-center justify-center p-6 text-center z-10 pt-20">
		<div class="w-full max-w-3xl p-8 md:p-12 rounded-2xl bg-white/5 backdrop-blur-lg border border-white/10">
			<h1 class="text-4xl md:text-6xl font-bold text-white mb-6">
				Parlons de votre <span class="text-aura-green neon-text">sécurité</span>
			</h1>
			<p class="text-lg text-gray-400 mb-10 leading-relaxed max-w-2xl mx-auto">
				Décrivez votre besoin et notre équipe vous recontacte rapidement pour construire une stratégie de protection adaptée à votre entreprise.
			</p>

			<form class="w-full grid grid-cols-1 gap-4 text-left">
				<input
					type="text"
					placeholder="Nom"
					required
					class="w-full px-5 py-4 rounded-lg bg-white/5 backdrop-blur-md border border-white/10 text-white focus:outline-none focus:border-aura-green focus:ring-1 focus:ring-aura-green transition-all placeholder-gray-500"
				/>
				<input
					type="email"
					placeholder="Email professionnel"
					required
					class="w-full px-5 py-4 rounded-lg bg-white/5 backdrop-blur-md border border-white/10 text-white focus:outline-none focus:border-aura-green focus:ring-1 focus:ring-aura-green transition-all placeholder-gray-500"
				/>
				<textarea
					placeholder="Votre message"
					rows="5"
					required
					class="w-full px-5 py-4 rounded-lg bg-white/5 backdrop-blur-md border border-white/10 text-white focus:outline-none focus:border-aura-green focus:ring-1 focus:ring-aura-green transition-all placeholder-gray-500"
				></textarea>
				<button
					type="submit"
					class="mt-2 px-8 py-4 rounded-lg font-bold text-white border border-aura-green/40 bg-gradient-to-br from-aura-green/20 via-aura-green/35 to-emerald-300/20 backdrop-blur-md shadow-[0_10px_30px_rgba(0,255,102,0.2)] transition-all duration-300 hover:border-aura-green/70 hover:from-aura-green/35 hover:via-aura-green/55 hover:to-emerald-300/30 hover:shadow-[0_12px_35px_rgba(0,255,102,0.32)]"
				>
					Envoyer le message
				</button>
			</form>
		</div>
	</main>

	<footer class="w-full p-6 text-center text-sm text-gray-500 border-t border-white/10 bg-[#050505]/80 backdrop-blur-md z-10">
		<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
			<span>&copy; 2026 Orion Technologies. Tous droits réservés.</span>
			<div class="flex gap-4">
				<a href="#" class="hover:text-aura-green transition-colors">Mentions légales</a>
				<a href="#" class="hover:text-aura-green transition-colors">Politique de confidentialité</a>
			</div>
		</div>
	</footer>

</body>
</html>
